{% extends "base.html" %}
{% block title %}Log In · Expense Tracker{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12 rounded-xl bg-slate-800 p-8 border border-slate-700 shadow-sm">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-white">Welcome Back</h2>
        <p class="text-slate-400 text-sm mt-1">Sign in to your account.</p>
    </div>
    
    <form method="post" class="space-y-5">
        <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Username</label>
            <input type="text" name="username" required class="w-full rounded-md bg-slate-900 border border-slate-700 px-3 py-2.5 text-slate-100 focus:border-brand focus:outline-none transition text-sm">
        </div>
        <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
            <input type="password" name="password" required class="w-full rounded-md bg-slate-900 border border-slate-700 px-3 py-2.5 text-slate-100 focus:border-brand focus:outline-none transition text-sm">
        </div>
        <button type="submit" class="w-full py-2.5 px-4 bg-brand text-slate-900 font-bold rounded-md hover:bg-sky-400 transition text-sm mt-2">
            Sign In
        </button>
    </form>
    
    <p class="mt-6 text-center text-sm text-slate-500 border-t border-slate-700 pt-6">
        New here? <a href="{{ url_for('register') }}" class="text-brand hover:text-sky-300 transition font-medium">Create an account</a>
    </p>
</div>
{% endblock %}
